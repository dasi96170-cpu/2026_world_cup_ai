name: World Cup AI News Bot (Daily Report)

on:
  schedule:
    # 每天的 UTC 00:00 (台灣早上 08:00) 執行一次
    - cron: '0 0 * * *'
  # 允許我們在 GitHub 網頁上手動觸發
  workflow_dispatch: 

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: 1. 取得最新程式碼 (Checkout repository)
      uses: actions/checkout@v4
      
    - name: 2. 建立 Python 環境 (Set up Python)
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: 3. 安裝執行套件 (Install dependencies)
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: 4. 啟動 AI 情報掃描並產生網頁 (Run Main Script)
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        GITHUB_ACTIONS: "true"
      run: |
        python main.py

    - name: 5. 封裝靜態網頁檔案 (Upload Pages Artifact)
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

  deploy-pages:
    needs: run-bot
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 6. 發布至全世界 (Deploy to GitHub Pages)
        id: deployment
        uses: actions/deploy-pages@v4
